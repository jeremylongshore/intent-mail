name: Security

# L5 security-scan layer (tests/TESTING.md "Backlog → L5 security").
# Two independent jobs: gitleaks secret scan + OSV dependency scan.
# Warranted because this repo handles OAuth tokens.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history so gitleaks can scan every commit on the branch/PR.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE is only required for organization accounts, not
          # public repos. Left unset intentionally.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency scan (OSV)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # REPORT-ONLY: OSV currently surfaces 5 fix=NONE advisories in the
      # duckdb / node-gyp native build chain — documented and accepted in
      # tests/TESTING.md. `continue-on-error` is on the STEP (not the job) so a
      # non-zero OSV exit doesn't mark the check red; the job still concludes
      # green while the scan output stays visible. Remove this once the
      # build-chain advisories are resolved upstream to make OSV blocking.
      - name: Run OSV scanner
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=package-lock.json
